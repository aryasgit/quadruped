// ── BUILD NODE MAP ───────────────────────────────────────────────
const NM = {};
const nodes = raw_nodes.map(n => {
  const angle = Math.random() * Math.PI * 2;
  const dist  = 60 + Math.random() * 200;
  return { ...n, x: W/2 + Math.cos(angle)*dist, y: H/2 + Math.sin(angle)*dist, vx: 0, vy: 0 };
});
nodes.forEach(n => NM[n.id] = n);

const edges = raw_edges.map(e => ({ ...e, sn: NM[e.s], tn: NM[e.t] })).filter(e => e.sn && e.tn);

// degree centrality → size boost
const degree = {};
edges.forEach(e => {
  degree[e.s] = (degree[e.s]||0) + 1;
  degree[e.t] = (degree[e.t]||0) + 1;
});
nodes.forEach(n => {
  n.r = n.r + Math.sqrt(degree[n.id]||0) * 0.8;
});

// ── FORCE SIMULATION ────────────────────────────────────────────
const IDEAL = 90;
const REPEL = 3800;
const CENTER_F = 0.018;
const DAMP = 0.82;
const STEPS = 300;

function simulate() {
  for (let step = 0; step < STEPS; step++) {
    // repulsion
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i+1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        let dx = b.x - a.x, dy = b.y - a.y;
        const d2 = dx*dx + dy*dy + 1;
        const d  = Math.sqrt(d2);
        const f  = REPEL / d2;
        const fx = dx/d * f, fy = dy/d * f;
        a.vx -= fx; a.vy -= fy;
        b.vx += fx; b.vy += fy;
      }
    }
    // spring attraction
    edges.forEach(e => {
      const a = e.sn, b = e.tn;
      const dx = b.x - a.x, dy = b.y - a.y;
      const d  = Math.sqrt(dx*dx + dy*dy) + 0.01;
      const f  = (d - IDEAL) * 0.06 * e.w;
      const fx = dx/d * f, fy = dy/d * f;
      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    });
    // center gravity
    nodes.forEach(n => {
      n.vx += (W/2 - n.x) * CENTER_F;
      n.vy += (H/2 - n.y) * CENTER_F;
      n.vx *= DAMP; n.vy *= DAMP;
      n.x  += n.vx;  n.y  += n.vy;
    });
  }
  // clamp inside canvas with margin
  nodes.forEach(n => {
    n.x = Math.max(n.r + 30, Math.min(W - n.r - 30, n.x));
    n.y = Math.max(n.r + 30, Math.min(H - n.r - 30, n.y));
  });
}
simulate();

// ── GLYPH DRAWING ───────────────────────────────────────────────
function drawGlyph(ctx, g, x, y, r, color, alpha, hilight) {
  ctx.globalAlpha = alpha;
  ctx.fillStyle   = color + (DARK ? '55' : '33');
  ctx.strokeStyle = color;
  ctx.lineWidth   = hilight ? 2 : 1;

  ctx.beginPath();
  if (g === 'circle') {
    ctx.arc(x, y, r, 0, Math.PI*2);
  } else if (g === 'hex') {
    for (let i=0; i<6; i++) {
      const a = Math.PI/2 + i*Math.PI/3;
      i===0 ? ctx.moveTo(x+r*Math.cos(a), y+r*Math.sin(a))
            : ctx.lineTo(x+r*Math.cos(a), y+r*Math.sin(a));
    }
    ctx.closePath();
  } else if (g === 'diamond') {
    ctx.moveTo(x, y-r*1.2);
    ctx.lineTo(x+r, y);
    ctx.lineTo(x, y+r*1.2);
    ctx.lineTo(x-r, y);
    ctx.closePath();
  } else if (g === 'square') {
    const s = r * 0.85;
    ctx.rect(x-s, y-s, s*2, s*2);
  } else if (g === 'triangle') {
    ctx.moveTo(x, y-r*1.15);
    ctx.lineTo(x+r, y+r*0.7);
    ctx.lineTo(x-r, y+r*0.7);
    ctx.closePath();
  } else if (g === 'star') {
    for (let i=0; i<10; i++) {
      const a = (Math.PI/2) + i * Math.PI/5;
      const ir = i%2===0 ? r : r*0.45;
      i===0 ? ctx.moveTo(x+ir*Math.cos(a), y+ir*Math.sin(a))
            : ctx.lineTo(x+ir*Math.cos(a), y+ir*Math.sin(a));
    }
    ctx.closePath();
  } else if (g === 'cross') {
    const t = r*0.35;
    ctx.moveTo(x-t, y-r); ctx.lineTo(x+t, y-r);
    ctx.lineTo(x+t, y-t); ctx.lineTo(x+r, y-t);
    ctx.lineTo(x+r, y+t); ctx.lineTo(x+t, y+t);
    ctx.lineTo(x+t, y+r); ctx.lineTo(x-t, y+r);
    ctx.lineTo(x-t, y+t); ctx.lineTo(x-r, y+t);
    ctx.lineTo(x-r, y-t); ctx.lineTo(x-t, y-t);
    ctx.closePath();
  }
  ctx.fill();
  ctx.stroke();
  ctx.globalAlpha = 1;
}

// edge color gradient between two node colors
function edgeColor(sColor, tColor, alpha) {
  return sColor + Math.round(alpha * 255).toString(16).padStart(2,'0');
}

// ── INTERACTION ─────────────────────────────────────────────────
let hovered = null;
let dragging = null;
let dragOff  = { x: 0, y: 0 };

function getPos(e) {
  const rect = cv.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

function hitTest(mx, my) {
  for (let i = nodes.length-1; i >= 0; i--) {
    const n = nodes[i];
    const dx = mx - n.x, dy = my - n.y;
    if (dx*dx + dy*dy < (n.r+4)*(n.r+4)) return n;
  }
  return null;
}

function connectedIds(nodeId) {
  const ids = new Set();
  edges.forEach(e => {
    if (e.s === nodeId) ids.add(e.t);
    if (e.t === nodeId) ids.add(e.s);
  });
  return ids;
}

// ── RENDER ──────────────────────────────────────────────────────
function render() {
  ctx.clearRect(0, 0, W, H);

  const hovId    = hovered ? hovered.id : null;
  const connected = hovId ? connectedIds(hovId) : new Set();

  // edges
  edges.forEach(e => {
    const active = hovId && (e.s === hovId || e.t === hovId);
    const faded  = hovId && !active;
    const alpha  = faded ? 0.04 : active ? 0.85 : 0.22;
    const sCol   = GROUPS[e.sn.group].color;
    const tCol   = GROUPS[e.tn.group].color;

    // gradient edge
    const grad = ctx.createLinearGradient(e.sn.x, e.sn.y, e.tn.x, e.tn.y);
    grad.addColorStop(0, sCol + Math.round(alpha*255).toString(16).padStart(2,'0'));
    grad.addColorStop(1, tCol + Math.round(alpha*255).toString(16).padStart(2,'0'));

    ctx.beginPath();
    // slight curve via midpoint offset
    const mx = (e.sn.x + e.tn.x)/2 - (e.tn.y - e.sn.y)*0.08;
    const my = (e.sn.y + e.tn.y)/2 + (e.tn.x - e.sn.x)*0.08;
    ctx.moveTo(e.sn.x, e.sn.y);
    ctx.quadraticCurveTo(mx, my, e.tn.x, e.tn.y);
    ctx.strokeStyle = grad;
    ctx.lineWidth   = active ? e.w * 1.8 : e.w * 0.7;
    ctx.setLineDash(e.w < 1 ? [3,4] : []);
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // nodes
  nodes.forEach(n => {
    const isHov  = n.id === hovId;
    const isConn = connected.has(n.id);
    const faded  = hovId && !isHov && !isConn;
    const alpha  = faded ? 0.12 : 1;
    const g      = GROUPS[n.group];

    drawGlyph(ctx, g.glyph, n.x, n.y, n.r, g.color, alpha, isHov || isConn);

    // label
    if (!faded && (isHov || isConn || n.r > 9)) {
      ctx.globalAlpha = isHov ? 1 : isConn ? 0.85 : 0.6;
      ctx.fillStyle   = DARK ? '#d4d2c9' : '#2c2c2a';
      ctx.font        = `${isHov ? 500 : 400} ${isHov ? 11 : 10}px var(--font-mono, monospace)`;
      ctx.textAlign   = 'center';
      ctx.fillText(n.label, n.x, n.y + n.r + 13);
      ctx.globalAlpha = 1;
    }
  });
}

// ── ANIMATION LOOP ───────────────────────────────────────────────
let animating = false;
let frame;

function startAnim() {
  if (animating) return;
  animating = true;
  function loop() {
    if (!animating) return;
    // settle remaining momentum
    nodes.forEach(n => {
      if (Math.abs(n.vx)+Math.abs(n.vy) > 0.01) {
        n.vx *= 0.9; n.vy *= 0.9;
        n.x  += n.vx;  n.y  += n.vy;
        n.x = Math.max(n.r+20, Math.min(W-n.r-20, n.x));
        n.y = Math.max(n.r+20, Math.min(H-n.r-20, n.y));
      }
    });
    render();
    frame = requestAnimationFrame(loop);
  }
  frame = requestAnimationFrame(loop);
}

// ── EVENTS ───────────────────────────────────────────────────────
const infoEl = document.getElementById('info');

function onMove(e) {
  e.preventDefault();
  const { x, y } = getPos(e);
  if (dragging) {
    dragging.x = x - dragOff.x;
    dragging.y = y - dragOff.y;
    dragging.vx = dragging.vy = 0;
    render();
    return;
  }
  const hit = hitTest(x, y);
  if (hit !== hovered) {
    hovered = hit;
    render();
  }
  if (hit) {
    cv.style.cursor = 'grab';
    const g = GROUPS[hit.group];
    infoEl.innerHTML =
      `<strong style="color:${g.color}">${hit.label}</strong><br>` +
      `${hit.desc}<br>` +
      `<span style="opacity:0.6">group: ${hit.group} · deg: ${degree[hit.id]||0}</span>`;
  } else {
    cv.style.cursor = 'default';
    infoEl.innerHTML = '';
  }
}

function onDown(e) {
  const { x, y } = getPos(e);
  const hit = hitTest(x, y);
  if (hit) {
    dragging = hit;
    dragOff  = { x: x - hit.x, y: y - hit.y };
    hit.vx = hit.vy = 0;
    cv.style.cursor = 'grabbing';
    if (!animating) startAnim();
  }
}

function onUp() {
  dragging = null;
  cv.style.cursor = hovered ? 'grab' : 'default';
}

cv.addEventListener('mousemove',  onMove, { passive: false });
cv.addEventListener('mousedown',  onDown);
cv.addEventListener('mouseup',    onUp);
cv.addEventListener('mouseleave', () => { hovered = null; infoEl.innerHTML=''; render(); });
cv.addEventListener('touchmove',  onMove, { passive: false });
cv.addEventListener('touchstart', onDown, { passive: true });
cv.addEventListener('touchend',   onUp);

// ── LEGEND ───────────────────────────────────────────────────────
const legEl = document.getElementById('legend');
Object.entries(GROUPS).forEach(([k, g]) => {
  legEl.innerHTML += `<div class="li">
    <div class="ls" style="background:${g.color}"></div>
    <span>${g.label}</span>
  </div>`;
});

render();
setTimeout(startAnim, 100);
setTimeout(() => { animating = false; cancelAnimationFrame(frame); render(); }, 3000);
</script>
</body>
</html>
